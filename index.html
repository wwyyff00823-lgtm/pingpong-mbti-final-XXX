<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>业余乒乓球人的MBTI风格测试</title>
    <script src="/script.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
        body { background-color: #f9f7f2; padding: 20px 15px; }
        .wrap { max-width: 420px; margin: 0 auto; }
        h1 { font-size: 26px; color: #c81623; text-align: center; margin: 20px 0 10px; }
        .desc { font-size: 16px; color: #555; text-align: center; margin-bottom: 35px; line-height: 1.6; }
        .level-box { margin: 30px 0; }
        .level-item {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 18px 15px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 17px;
            color: #333;
            transition: all 0.2s;
            position: relative;
        }
        .level-item.active { border-color: #c81623; background-color: #fff0f2; }
        .level-item.active::after {
            content: "";
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #c81623;
        }
        .start-btn {
            display: block;
            width: 100%;
            height: 52px;
            line-height: 52px;
            text-align: center;
            font-size: 18px;
            color: #fff;
            background: linear-gradient(90deg, #c81623, #ff7800);
            border-radius: 10px;
            border: none;
            box-shadow: 0 3px 8px rgba(200,22,35,0.3);
            cursor: pointer;
            transition: transform 0.1s;
            margin: 20px 0;
        }
        .start-btn:active { transform: scale(0.98); }
        .copyright { text-align: center; font-size: 13px; color: #777; margin-top: 50px; line-height: 1.8; }
        .toast {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            background-color: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>业余乒乓球人的MBTI风格测试</h1>
        <p class="desc">5分钟，30道选择题，判断你的打球性格，给你专属涨球妙计</p>

        <div class="level-box">
            <div class="level-item" data-level="low">1200-1499【入门进阶】</div>
            <div class="level-item" data-level="mid">1500-1799【中坚力量】</div>
            <div class="level-item" data-level="high">1800-2099【准高手】</div>
        </div>

        <button class="start-btn" id="startBtn">开始测试</button>
        <div class="copyright">©️2026业余乒乓球人的MBTI风格测试版权所有，测试结果仅供参考</div>
    </div>

    <div class="toast" id="toast">哈喽，先选个水平再开始呗~</div>

    <script>
        let selectLevel = "";
        const levelItems = document.querySelectorAll(".level-item");
        const startBtn = document.getElementById("startBtn");
        const toast = document.getElementById("toast");

        levelItems.forEach(item => {
            item.addEventListener("click", function(){
                levelItems.forEach(i => i.classList.remove("active"));
                this.classList.add("active");
                selectLevel = this.dataset.level;
            });
        });

        startBtn.addEventListener("click", function(){
            if(!selectLevel){
                toast.style.display = "block";
                setTimeout(()=> toast.style.display = "none", 2000);
                return;
            }
            Storage.set("userLevel", selectLevel);
            Storage.remove("answers");
            Storage.remove("mbtiType");
            Storage.remove("integrityScore");
            Storage.remove("orderNo");
            Storage.remove("isPay");
            window.location.href = "/quiz.html";
        });
    </script>
</body>
</html>
