<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>业余乒乓实战人格MBTI精准测试</title>
    <!-- 外部CDN -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: "Microsoft YaHei", system-ui, sans-serif;
            background-color: #f5f7fa;
            font-size: 18px;
            line-height: 1.85;
            padding: 16px;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            background: #ffffff;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 34px;
            text-align: center;
            color: #165DFF;
            margin-bottom: 32px;
        }
        h2 {
            font-size: 28px;
            margin: 26px 0 18px;
            color: #222;
        }
        h3 {
            font-size: 24px;
            margin: 20px 0 12px;
        }
        p, label {
            font-size: 21px;
            margin: 14px 0;
            color: #333;
        }
        input[type="number"] {
            width: 100%;
            padding: 18px 22px;
            font-size: 23px;
            border: 3px solid #DCDFE6;
            border-radius: 14px;
            margin: 12px 0 28px;
        }
        button {
            width: 100%;
            padding: 20px 0;
            font-size: 23px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            margin: 14px 0;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.85;
        }
        .btn-primary {
            background-color: #165DFF;
            color: #fff;
        }
        .btn-success {
            background-color: #00B42A;
            color: #fff;
        }
        .btn-warning {
            background-color: #FF7D00;
            color: #fff;
        }
        .btn-gray {
            background-color: #86909C;
            color: #fff;
        }
        /* 分页控制 */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        /* 答题选项超大样式，长辈友好 */
        .answer-option {
            display: block;
            padding: 16px 20px;
            border: 3px solid #E5E6EB;
            border-radius: 14px;
            margin: 14px 0;
            cursor: pointer;
        }
        .answer-option input {
            width: 24px;
            height: 24px;
            margin-right: 14px;
            vertical-align: middle;
        }
        .answer-option:has(input:checked) {
            border-color: #165DFF;
            background-color: #F0F7FF;
        }
        /* 进度条+模组标注 */
        .progress-wrap {
            width: 100%;
            height: 24px;
            border: 2px solid #DCDFE6;
            border-radius: 14px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-inner {
            height: 100%;
            background-color: #165DFF;
            width: 0%;
            transition: width 0.3s ease;
        }
        .module-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #E8F3FF;
            color: #165DFF;
            border-radius: 8px;
            font-size: 18px;
            margin-bottom: 10px;
        }
        /* 结果海报卡片（用于导出图片） */
        #result-poster {
            padding: 30px 24px;
            border: 2px solid #E5E6EB;
            border-radius: 18px;
            background: #fff;
            margin: 24px 0;
        }
        .poster-title {
            text-align: center;
            font-size: 26px;
            color: #165DFF;
            font-weight: bold;
        }
        .person-fun-title {
            text-align: center;
            font-size: 24px;
            margin: 16px 0;
            color: #FF7D00;
            font-weight: bold;
        }
        .three-desc-text {
            margin: 20px 0;
        }
        .confidence-tip {
            margin: 16px 0;
            padding: 12px;
            background: #FFFBEB;
            border-radius: 12px;
            font-size: 19px;
        }
        .qrcode-wrap {
            text-align: center;
            margin-top: 30px;
        }
        /* 付费提示区域 */
        .pay-mask-tip {
            margin: 30px 0 10px;
            padding: 26px 20px;
            background-color: #FFF7E6;
            border-radius: 16px;
            text-align: center;
        }
        .full-report-box {
            margin-top: 20px;
            padding: 24px;
            border: 2px dashed #FF7D00;
            border-radius: 16px;
            display: none;
        }
        .full-report-box h4 {
            font-size: 22px;
            margin: 18px 0 10px;
            color: #E65100;
        }
        .anti-intuition-tip {
            padding: 16px;
            background: #FFF2CC;
            border-radius: 12px;
            margin: 20px 0;
        }
        /* 全局弹窗遮罩 */
        .global-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .global-modal.show {
            display: flex;
        }
        .modal-content {
            width: 90%;
            max-width: 540px;
            background: #fff;
            padding: 34px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 页面1：首页录入积分 -->
    <div id="page-home" class="page active">
        <h1>业余乒乓实战人格MBTI精准测试</h1>
        <p>全真实战情景答题，算法校验防乱选，精准匹配你的专属球风</p>
        <label>请填写你的开球网积分：</label>
        <input type="number" id="score-input" placeholder="例：1520">
        <button class="btn-primary" id="start-test">开始答题测试</button>
    </div>

    <!-- 页面2：逐题答题页 -->
    <div id="page-answer" class="page">
        <h2>正在作答</h2>
        <div class="progress-wrap">
            <div class="progress-inner" id="progress-bar"></div>
        </div>
        <span id="module-name-tag" class="module-tag"></span>
        <div id="question-container"></div>
        <button class="btn-primary" id="next-btn">下一题</button>
    </div>

    <!-- 页面3：结果海报页 -->
    <div id="page-result" class="page">
        <div id="result-poster">
            <div class="poster-title">你的乒乓专属球风测试结果</div>
            <div class="person-fun-title" id="person-fun-title"></div>
            <div id="three-desc-text" class="three-desc-text"></div>
            <div id="confidence-block" class="confidence-tip"></div>
            <div class="qrcode-wrap">
                <p>扫码即可参与测试</p>
                <div id="poster-qrcode"></div>
            </div>
        </div>

        <button class="btn-warning" id="download-poster">一键下载结果海报图片</button>

        <!-- 付费解锁入口 -->
        <div class="pay-mask-tip">
            <h3>解锁完整千字实战分析报告</h3>
            <p>仅需9.9元，包含：短板拆解、训练方案、定型打法、器材推荐、双打搭档适配</p>
            <button class="btn-success" id="open-pay-modal">立即支付解锁完整干货</button>
        </div>

        <!-- 付费后完整报告区域 -->
        <div class="full-report-box" id="full-report-wrap">
            <div id="full-report-content"></div>
        </div>

        <button class="btn-gray" id="restart-all-test">重新开始测试</button>
    </div>
</div>

<!-- 支付弹窗 -->
<div class="global-modal" id="pay-modal">
    <div class="modal-content">
        <h2 style="text-align:center">支付解锁完整实战报告</h2>
        <p style="text-align:center;margin:20px 0;">订单金额：<strong>9.9 元</strong></p>
        <p style="font-size:18px;color:#666;">一次付费永久查看，全套训练+器材干货无二次收费</p>
        <button class="btn-success" id="submit-pay">确认发起支付</button>
        <button class="btn-gray" id="close-pay-modal">取消</button>
    </div>
</div>

<!-- 支付成功弹窗 -->
<div class="global-modal" id="pay-success-modal">
    <div class="modal-content">
        <h2 style="text-align:center;color:#00B42A">支付成功！</h2>
        <p style="text-align:center;margin:24px 0;">已解锁全部实战干货分析报告</p>
        <button class="btn-primary" id="check-full-report">查看完整专业报告</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
