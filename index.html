<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>业余乒乓实战MBTI精准测试</title>
    <!-- 外部CDN -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: "Microsoft YaHei", system-ui, sans-serif;
            /* 乒乓球主题浅背景：淡色底+模拟乒乓球纹理 */
            background-color: #f0f5ff;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(22, 93, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 125, 0, 0.05) 0%, transparent 40%);
            font-size: 18px;
            line-height: 1.85;
            padding: 16px;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            background: #ffffff;
            padding: 36px 32px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(22, 93, 255, 0.1);
        }
        h1 {
            font-size: 36px;
            text-align: center;
            color: #165DFF;
            margin-bottom: 12px;
        }
        .home-subtitle {
            text-align: center;
            color: #666;
            font-size: 20px;
            margin-bottom: 40px;
        }
        h2 {
            font-size: 28px;
            margin: 20px 0 18px;
            color: #222;
        }
        h3 {
            font-size: 24px;
            margin: 20px 0 12px;
        }
        p, label {
            font-size: 21px;
            margin: 14px 0;
            color: #333;
        }
        input[type="number"] {
            width: 100%;
            padding: 18px 22px;
            font-size: 23px;
            border: 3px solid #DCDFE6;
            border-radius: 14px;
            margin: 12px 0 28px;
        }
        button {
            width: 100%;
            padding: 20px 0;
            font-size: 23px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            margin: 14px 0;
            transition: all 0.2s;
        }
        button:active {
            opacity: 0.85;
            transform: scale(0.98);
        }
        .btn-primary {
            background-color: #165DFF;
            color: #fff;
        }
        .btn-success {
            background-color: #00B42A;
            color: #fff;
        }
        .btn-warning {
            background-color: #FF7D00;
            color: #fff;
        }
        .btn-gray {
            background-color: #86909C;
            color: #fff;
        }
        /* 分页控制 */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        /* 答题选项样式 */
        .answer-option {
            display: block;
            padding: 16px 20px;
            border: 3px solid #E5E6EB;
            border-radius: 14px;
            margin: 14px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .answer-option:hover {
            border-color: #165DFF;
            background: #F0F7FF;
        }
        .answer-option input {
            width: 24px;
            height: 24px;
            margin-right: 14px;
            vertical-align: middle;
        }
        .answer-option:has(input:checked) {
            border-color: #165DFF;
            background-color: #F0F7FF;
        }
        /* 进度条+模组标注 */
        .progress-wrap {
            width: 100%;
            height: 24px;
            border: 2px solid #DCDFE6;
            border-radius: 14px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-inner {
            height: 100%;
            background-color: #165DFF;
            width: 0%;
            transition: width 0.3s ease;
        }
        .module-tag {
            display: inline-block;
            padding: 6px 16px;
            background: #E8F3FF;
            color: #165DFF;
            border-radius: 10px;
            font-size: 19px;
            margin-bottom: 16px;
            font-weight: bold;
        }

        /* ========== 结果页样式优化 ========== */
        .result-card {
            padding: 30px 24px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f0f7ff 0%, #fff7ed 100%);
            margin: 24px 0;
            text-align: center;
        }
        .mbti-code {
            font-size: 56px;
            font-weight: 900;
            color: #165DFF;
            letter-spacing: 8px;
            margin-bottom: 16px;
        }
        .person-img-placeholder {
            width: 100%;
            max-width: 280px;
            height: 200px;
            margin: 0 auto 20px;
            background: #eef2f7;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 18px;
        }
        .person-img-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }
        .fun-title {
            font-size: 28px;
            font-weight: bold;
            color: #FF7D00;
            margin-bottom: 20px;
        }
        .desc-list {
            list-style: none;
            text-align: left;
            padding: 0;
        }
        .desc-list li {
            font-size: 20px;
            padding: 8px 0;
            border-bottom: 1px dashed #e5e6eb;
        }
        .desc-list li:last-child {
            border-bottom: none;
        }
        .confidence-tip {
            margin: 20px 0;
            padding: 14px 18px;
            background: #FFFBEB;
            border-radius: 12px;
            font-size: 19px;
            text-align: left;
        }
        .qrcode-wrap {
            text-align: center;
            margin-top: 24px;
            padding: 20px;
            background: #fff;
            border-radius: 16px;
        }
        .qrcode-wrap p {
            margin-bottom: 12px;
            font-size: 19px;
            color: #666;
        }
        .screenshot-tip {
            text-align: center;
            color: #86909C;
            font-size: 18px;
            margin-top: 10px;
        }

        /* 付费提示区域 */
        .pay-mask-tip {
            margin: 30px 0 10px;
            padding: 28px 20px;
            background: linear-gradient(135deg, #fff7ed 0%, #ffe7cc 100%);
            border-radius: 16px;
            text-align: center;
        }
        .pay-mask-tip h3 {
            color: #E65100;
            margin-bottom: 10px;
        }

        /* ========== 完整报告排版优化 ========== */
        .full-report-box {
            margin-top: 20px;
            padding: 24px;
            border-radius: 16px;
            background: #fafbfc;
            display: none;
        }
        .report-section {
            padding: 18px 20px;
            border-radius: 12px;
            margin-bottom: 18px;
        }
        .report-section.blue {
            background: #f0f7ff;
        }
        .report-section.orange {
            background: #fff7ed;
        }
        .report-section.green {
            background: #f0fff4;
        }
        .report-section.purple {
            background: #faf0ff;
        }
        .report-title {
            font-size: 22px;
            font-weight: bold;
            color: #222;
            margin-bottom: 10px;
            display: block;
        }
        .report-section p {
            font-size: 19px;
            margin: 8px 0;
            color: #333;
        }
        .anti-intuition {
            padding: 18px;
            background: #FFF2CC;
            border-radius: 12px;
            margin: 20px 0;
        }
        .anti-intuition strong {
            color: #B7791F;
            font-size: 20px;
        }

        /* 全局弹窗遮罩 */
        .global-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .global-modal.show {
            display: flex;
        }
        .modal-content {
            width: 90%;
            max-width: 540px;
            background: #fff;
            padding: 34px;
            border-radius: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
<div class="container">
    <!-- 页面1：首页录入积分 -->
    <div id="page-home" class="page active">
        <h1>乒乓实战MBTI性格测试</h1>
        <p class="home-subtitle">30道真实打球情景题 · 算法防乱选校验 · 精准匹配你的专属球风</p>
        
        <label>请填写你的开球网积分：</label>
        <input type="number" id="score-input" placeholder="例：1520">
        <button class="btn-primary" id="start-test">开始答题测试</button>
    </div>

    <!-- 页面2：逐题答题页 -->
    <div id="page-answer" class="page">
        <h2>正在作答</h2>
        <div class="progress-wrap">
            <div class="progress-inner" id="progress-bar"></div>
        </div>
        <span id="module-name-tag" class="module-tag"></span>
        <div id="question-container"></div>
        <button class="btn-primary" id="next-btn">下一题</button>
    </div>

    <!-- 页面3：结果海报页 -->
    <div id="page-result" class="page">
        <div class="result-card">
            <!-- MBTI四字母大字号 -->
            <div class="mbti-code" id="mbti-code-text">ENTJ</div>
            
            <!-- 图片占位区：后续替换src即可 -->
            <div class="person-img-placeholder" id="person-img-box">
                人格示意图占位
            </div>
            
            <!-- 短趣味称号 -->
            <div class="fun-title" id="fun-title-text">强攻统帅</div>
            
            <!-- 三要点自动分行 -->
            <ul class="desc-list" id="desc-list-box"></ul>
        </div>

        <!-- 置信度提示 -->
        <div id="confidence-block" class="confidence-tip"></div>

        <!-- 二维码+截图提示 -->
        <div class="qrcode-wrap">
            <p>扫码即可参与同款测试</p>
            <div id="poster-qrcode"></div>
            <p class="screenshot-tip">长按页面截图，即可分享给球友</p>
        </div>

        <!-- 付费解锁入口 -->
        <div class="pay-mask-tip">
            <h3>解锁完整千字深度实战分析报告</h3>
            <p>仅需9.9元，包含：短板拆解、分阶段训练方案、定型打法、底板胶皮器材精准推荐、双打搭档适配</p>
            <button class="btn-success" id="open-pay-modal">立即支付解锁完整干货</button>
        </div>

        <!-- 付费后完整报告区域 -->
        <div class="full-report-box" id="full-report-wrap">
            <div id="full-report-content"></div>
        </div>

        <button class="btn-gray" id="restart-all-test">重新开始测试</button>
    </div>
</div>

<!-- 支付弹窗 -->
<div class="global-modal" id="pay-modal">
    <div class="modal-content">
        <h2 style="text-align:center">支付解锁完整实战报告</h2>
        <p style="text-align:center;margin:20px 0;">订单金额：<strong>9.9 元</strong></p>
        <p style="font-size:18px;color:#666;text-align:center;">支付后永久查看完整千字分析报告</p>
        <button class="btn-success" id="submit-pay">确认发起支付</button>
        <button class="btn-gray" id="close-pay-modal">取消</button>
    </div>
</div>

<!-- 支付成功弹窗 -->
<div class="global-modal" id="pay-success-modal">
    <div class="modal-content">
        <h2 style="text-align:center;color:#00B42A">支付成功！</h2>
        <p style="text-align:center;margin:24px 0;">已解锁全部实战干货分析报告</p>
        <button class="btn-primary" id="check-full-report">查看完整专业报告</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
