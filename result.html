<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>乒乓MBTI - 测试结果</title>
    <script src="/script.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
        body { background-color: #f9f7f2; padding: 15; line-height: 1.8; color: #444; }
        .wrap { max-width: 420px; margin: 0 auto; }

        /* MBTI 字母样式 */
        .mbti-code {
            font-size: 42px;
            color: #c81623;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0.15);
            margin: 20px 0 10px;
        }
        /* 人格绰号 */
        .person-name {
            font-size: 26px;
            color: #c81623;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        /* 1:1方形占位图（文字版，图片后续再改） */
        .avatar-box {
            width: 180px;
            height: 180px;
            background-color: #ffe8e8;
            border-radius: 12px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c81623;
            font-size: 16px;
        }
        /* 三句概述 */
        .brief-box {
            background: #fff;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 25px;
            border: 1px solid #eee;
        }
        .brief-item {
            font-size: 16px;
            margin-bottom: 8px;
        }
        /* 付费解锁区域 */
        .pay-tip {
            text-align: center;
            font-size: 16px;
            margin-bottom: 15px;
            line-height: 1.7;
        }
        .pay-btn {
            width: 100%;
            height: 52px;
            line-height: 52px;
            background: linear-gradient(90deg, #c81623, #ff7800);
            color: #fff;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(200,22,35,0.3);
            cursor: pointer;
            margin-bottom: 20px;
        }
        .pay-btn:active { transform: scale(0.98); }
        .pay-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        /* 完整报告区域 */
        .report-box {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid #eee;
            display: none;
        }
        .report-content {
            font-size: 15px;
            line-height: 1.9;
            white-space: pre-line;
        }
        /* 重新测试按钮 */
        .reset-btn {
            width: 100%;
            height: 48px;
            line-height: 48px;
            background: #666;
            color: #fff;
            font-size: 17px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
        }
        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 15px;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <!-- MBTI 大字母 -->
        <div class="mbti-code" id="mbtiCode"></div>
        <!-- 人格绰号 -->
        <div class="person-name" id="personName"></div>
        <!-- 文字占位图（图片后续再替换） -->
        <div class="avatar-box">乒乓人格形象</div>
        <!-- 三句特点概述 -->
        <div class="brief-box" id="briefBox"></div>

        <!-- 加载提示 -->
        <div class="loading" id="loading"></div>

        <!-- 付费解锁区域 -->
        <div class="pay-tip">
            查看完整千字报告、涨球方案、器材建议<br>
            仅需9.9元解锁全部内容
        </div>
        <button class="pay-btn" id="payBtn">立刻付款解锁报告</button>

        <!-- 完整报告区域 -->
        <div class="report-box" id="reportBox">
            <div class="report-content" id="reportContent"></div>
        </div>

        <!-- 重新测试按钮 -->
        <button class="reset-btn" id="resetBtn">重新测试</button>
    </div>

    <script>
        // 全局错误捕获
        window.onerror = function(msg,url,line){
            alert("页面出现小异常，请刷新重试：" + msg);
            return true;
        };

        // 页面元素
        const mbtiCode = document.getElementById("mbtiCode");
        const personName = document.getElementById("personName");
        const briefBox = document.getElementById("briefBox");
        const payBtn = document.getElementById("payBtn");
        const loading = document.getElementById("loading");
        const reportBox = document.getElementById("reportBox");
        const reportContent = document.getElementById("reportContent");
        const resetBtn = document.getElementById("resetBtn");

        // 全局变量
        let userLevel = "";
        let mbtiType = "";
        let currentOrderNo = "";
        let pollTimer = null;

        // 初始化页面
        function initResult(){
            try {
                userLevel = Storage.get("userLevel") || "low";
                mbtiType = Storage.get("mbtiType") || "ESTP";
                currentOrderNo = Storage.get("orderNo") || "";
                const isPay = Storage.get("isPay") || false;

                const mbtiInfo = MBTI_DATA[mbtiType];
                if(!mbtiInfo){
                    alert("测试数据异常，请返回重新答题！");
                    window.location.href = "/index.html";
                    return;
                }

                // 渲染MBTI字母、绰号
                mbtiCode.innerText = mbtiType;
                personName.innerText = mbtiInfo.name;

                // 渲染三句概述
                let briefHtml = "";
                mbtiInfo.brief.forEach(item => {
                    briefHtml += `<div class="brief-item">${item}</div>`;
                });
                briefBox.innerHTML = briefHtml;

                // 已支付直接展示完整报告
                if(isPay && currentOrderNo){
                    showFullReport();
                    payBtn.style.display = "none";
                }
            } catch (e) {
                console.error("初始化失败：", e);
                alert("页面初始化失败，请刷新页面！");
            }
        }

        // 展示完整报告
        function showFullReport(){
            try {
                const mbtiInfo = MBTI_DATA[mbtiType];
                let reportText = "";
                switch(userLevel){
                    case "low": reportText = mbtiInfo.report.low; break;
                    case "mid": reportText = mbtiInfo.report.mid; break;
                    case "high": reportText = mbtiInfo.report.high; break;
                    default: reportText = mbtiInfo.report.low;
                }
                reportContent.innerText = reportText;
                reportBox.style.display = "block";
            } catch (e) {
                alert("报告加载失败：" + e.message);
            }
        }

        // 创建订单 + 唤起支付 【核心修复：报错恢复按钮】
        async function createPayOrder(){
            try {
                payBtn.disabled = true;
                loading.style.display = true;

                const res = await fetch(API_URL.createOrder, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        orderNo: createOrderNo(),
                        price: HUPIJIAO_CONFIG.payPrice
                    })
                });

                const data = await res.json();
                if(data.code !== 0){
                    throw new Error("订单创建失败：" + data.msg);
                }

                currentOrderNo = data.orderNo;
                Storage.set("orderNo", currentOrderNo);

                // 跳转微信H5支付
                const payUrl = `https://api.xunhupay.com/pay?appid=${HUPIJIAO_CONFIG.appId}&orderid=${currentOrderNo}&price=${HUPIJIAO_CONFIG.payPrice}&subject=${encodeURIComponent(HUPIJIAO_CONFIG.subject)}&body=${encodeURIComponent(HUPIJIAO_CONFIG.body)}&paytype=wxh5`;
                window.location.href = payUrl;

            } catch (e) {
                // ========== 关键修复：报错后恢复按钮可点击 ==========
                loading.style.display = false;
                payBtn.disabled = false; 
                alert("发起支付失败：" + e.message);
                console.error(e);
            }
        }

        // 轮询订单状态（限制最大轮询次数，防止死循环）
        function pollOrderStatus(){
            let pollCount = 0;
            const maxPoll = 30;
            pollTimer = setInterval(async () => {
                pollCount++;
                if(pollCount > maxPoll){
                    clearInterval(pollTimer);
                    loading.style.display = false;
                    alert("订单查询超时，请手动刷新页面查看结果！");
                    return;
                }

                try {
                    const res = await fetch(`${API_URL.checkOrder}?orderNo=${currentOrderNo}`);
                    const data = await res.json();

                    // 1=已支付  2=订单关闭
                    if(data.payStatus === 1){
                        clearInterval(pollTimer);
                        loading.style.display = false;
                        Storage.set("isPay", true);
                        payBtn.style.display = "none";
                        showFullReport();
                    } else if(data.payStatus === 2){
                        clearInterval(pollTimer);
                        loading.style.display = false;
                        payBtn.disabled = false;
                        alert("订单已取消或支付失败，请重新尝试！");
                    }
                } catch (e) {
                    console.error("查询订单异常：", e);
                }
            }, 5000);
        }

        // 重新测试：清空本地数据，返回首页
        resetBtn.addEventListener("click", function(){
            if(pollTimer) clearInterval(pollTimer);
            Storage.clearAll();
            window.location.href = "/index.html";
        });

        // 支付按钮点击事件
        payBtn.addEventListener("click", createPayOrder);

        // 从支付页返回后，自动查询订单状态
        window.addEventListener("pageshow", function(){
            if(currentOrderNo){
                loading.style.display = true;
                pollOrderStatus();
            }
        });

        // 页面加载完成执行初始化
        window.onload = initResult;
    </script>
</body>
</html>
